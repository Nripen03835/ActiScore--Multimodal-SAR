{% extends "base.html" %}

{% block title %}Profile - ActiScore{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2"><i class="fas fa-user text-indigo-600 mr-3"></i>Profile</h1>
        <p class="text-gray-600">Manage your account information.</p>
    </div>
    <div class="bg-white rounded-lg shadow-lg p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <div class="text-sm text-gray-500 mb-1">Name</div>
                <div class="text-lg font-medium text-gray-900">{{ user.name }}</div>
            </div>
            <div>
                <div class="text-sm text-gray-500 mb-1">Email</div>
                <div class="text-lg font-medium text-gray-900">{{ user.email }}</div>
            </div>
            <div>
                <div class="text-sm text-gray-500 mb-1">Role</div>
                <div class="text-lg font-medium text-gray-900">{{ user.role }}</div>
            </div>
            <div>
                <div class="text-sm text-gray-500 mb-1">Joined</div>
                <div class="text-lg font-medium text-gray-900">{{ user.created_at.strftime('%Y-%m-%d') }}</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
